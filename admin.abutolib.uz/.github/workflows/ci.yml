name: Deploy Nuxt to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Updated to v4

      - name: Install Node.js
        uses: actions/setup-node@v4 # Updated to v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3 # Updated to v3
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        # This is the critical fix for the OOM error
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: pnpm run build

      - name: Deploy to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: 22
          source: ".output/*"
          target: "/var/www/abutolib/admin"
          strip_components: 0

      - name: Restart PM2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: 22
          script: |
            cd /var/www/abutolib/admin
            # Ensure node/pm2 are in the PATH
            export PATH=$PATH:/usr/bin:/usr/local/bin
            # Check if process exists and restart, otherwise start new
            pm2 restart abutolib-admin --update-env || pm2 start .output/server/index.mjs --name "abutolib-admin"
            pm2 save