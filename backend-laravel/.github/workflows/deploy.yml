name: Deploy Laravel Backend

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, curl, openssl, xml, zip

      - name: Composer Install
        run: composer install --no-dev --optimize-autoloader

      - name: SCP Files
        uses: appleboy/scp-action@master
        with:
          host: 5.42.113.216
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "."
          target: "/var/www/abutolib/backend"

      - name: SSH Commands
        uses: appleboy/ssh-action@master
        with:
          host: 5.42.113.216
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /var/www/abutolib/backend
            php artisan migrate --force
            php artisan cache:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan optimize
            chown -R www-data:www-data /var/www/abutolib/backend
            chmod -R 775 /var/www/abutolib/backend/storage
            chmod -R 775 /var/www/abutolib/backend/bootstrap/cache
